server.name=gateway-service
server.port=8090
eureka.client.service-url.default-zone=http://localhost:8091/eureka/

spring.cloud.gateway.routes[0].id=order-service
spring.cloud.gateway.routes[0].uri=lb://order-service
spring.cloud.gateway.routes[0].predicate=Path=/orders/**

